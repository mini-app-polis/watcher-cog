# watcher-cog / evaluator.yaml
# Per-repo evaluation configuration — ecosystem-standards ADR-001, ADR-002

type: trigger-cog

traits:
  - logger-primitive
  # src/watcher_cog/logger.py is the logger wrapper implementation for this
  # service — CD-009 (shared logger requirement) cannot apply to itself.

# No exemptions — TEST-001/002/004 covered by trigger-cog type scoping.
# PIPE-008/011 covered by trigger-cog type scoping.

deferrals:
  - rule: PY-013
    reason: "Deduplication logic present but possible_duplicate_ prefixing not yet implemented."
    until: "2026-07-01"
  - rule: CD-HEALTHCHECKS
    reason: >
      watcher-cog pings Healthchecks.io on every poll cycle via heartbeat.py using
      HEALTHCHECKS_URL_WATCHER. The checker is looking for HEALTHCHECKS_URL_EVALUATOR which is
      an evaluator-cog concern. This service correctly implements the liveness ping —
      the finding is a false positive caused by the checker expecting a per-service
      suffix that does not apply to trigger-cog type services.
    until: null
