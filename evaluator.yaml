# watcher-cog / evaluator.yaml
# Per-repo evaluation configuration — ecosystem-standards ADR-001, ADR-002

type: trigger-cog

traits:
  - logger-primitive
  # src/watcher_cog/logger.py is the logger wrapper implementation for this
  # service — CD-009 (shared logger requirement) cannot apply to itself.

exemptions:
  - rule: PRIN-005
    reason: "Three-layer observability is satisfied for this trigger-cog: Healthchecks liveness ping via HEALTHCHECKS_URL_WATCHER (src/watcher_cog/heartbeat.py, pinged on each poll cycle), structured logging via common-python-utils (declared dependency, shared logger used throughout), and Sentry error tracking (sentry-sdk initialized in src/watcher_cog/main.py at startup). PRIN-005's check_notes scope 'Prefect run history' to pipelines via the '(for pipelines)' parenthetical. Watcher-cog is a trigger-cog, not a pipeline — its operational signal is the Healthchecks ping cadence plus Sentry exceptions. Prefect run history belongs to the downstream pipeline-cogs watcher-cog triggers, not the trigger source itself."

deferrals:
  - rule: PY-013
    reason: "Deduplication logic present but possible_duplicate_ prefixing not yet implemented."
    until: "2026-07-01"
