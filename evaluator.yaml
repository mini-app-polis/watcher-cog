# watcher-cog / evaluator.yaml
# Per-repo evaluation configuration — ecosystem-standards ADR-001, ADR-002

type: trigger-cog

traits:
  - logger-primitive
  # src/watcher_cog/logger.py is the logger wrapper implementation for this
  # service — CD-009 (shared logger requirement) cannot apply to itself.

exemptions:
  - rule: PRIN-005
    reason: "Three-layer observability is satisfied for this trigger-cog: Healthchecks liveness ping via HEALTHCHECKS_URL_WATCHER (src/watcher_cog/heartbeat.py, pinged on each poll cycle), structured logging via common-python-utils (declared dependency, shared logger used throughout), and Sentry error tracking (sentry-sdk initialized in src/watcher_cog/main.py at startup). PRIN-005's check_notes scope 'Prefect run history' to pipelines via the '(for pipelines)' parenthetical. Watcher-cog is a trigger-cog, not a pipeline — its operational signal is the Healthchecks ping cadence plus Sentry exceptions. Prefect run history belongs to the downstream pipeline-cogs watcher-cog triggers, not the trigger source itself."
  - rule: PY-013
    reason: "Watcher-cog has no processing inputs that can be duplicated. Its core loop (src/watcher_cog/watcher.py) performs change detection across Drive folder snapshots — comparing current file state against the previous poll's `seen` dict — and fires a downstream Prefect trigger when new or modified files are detected. This is change detection, not deduplication. The cog does not process file contents; downstream pipeline-cogs handle idempotency for any work they do with the files. PY-013's detective check looks for dedup-awareness signals, but the conceptual category (dedup of processing inputs) does not apply here — there are no inputs being processed."
  - rule: TEST-002
    reason: "TEST-002 asks for a test exercising the cog's deduplication guard. Watcher-cog is exempt from PY-013 above (no processing inputs, therefore no dedup guard to test). The closest conceptual analogue in this cog is change detection — 'a file seen in a prior poll cycle does not re-fire the trigger on a subsequent poll' — which is covered by test_second_run_no_new_files_no_trigger in tests/test_watcher.py. Adding a dedup-named test would duplicate that coverage under misleading terminology. Tracked alongside PY-013 for consistency."
